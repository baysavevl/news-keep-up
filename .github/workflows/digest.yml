name: News Keep Up Digest

on:
  schedule:
    # Fallback tick from 07:08 through 22:53 Asia/Ho_Chi_Minh.
    # The app decides whether FDE, FDE interview, or Engineer is due.
    # Vercel/local schedulers can run the same endpoint; Turso de-dupes slots.
    - cron: "8,23,38,53 0-15 * * *"
  workflow_dispatch:

concurrency:
  group: news-keep-up-scheduler-tick
  cancel-in-progress: false

jobs:
  scheduler-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Vercel scheduler tick
        shell: bash
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent --max-time 290 \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "https://news-keep-up.vercel.app/api/scheduler/tick"
          echo
