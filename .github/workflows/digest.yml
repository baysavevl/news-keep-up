name: News Keep Up Digest

on:
  schedule:
    # Hourly from 08:10 through 22:10 Asia/Ho_Chi_Minh.
    - cron: "10 1-15 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Format digest without sending Telegram"
        type: boolean
        required: false
        default: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Vercel digest
        shell: bash
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
        run: |
          endpoints=(
            "https://news-keep-up.vercel.app/api/digest/engineer"
            "https://news-keep-up.vercel.app/api/digest/fde"
          )

          for url in "${endpoints[@]}"; do
            if [ "$DRY_RUN" = "true" ]; then
              url="${url}?dry_run=true"
            fi

            curl --fail --show-error --silent --max-time 120 \
              --header "Authorization: Bearer ${CRON_SECRET}" \
              "$url"
            echo
          done
