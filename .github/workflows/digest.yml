name: News Keep Up Digest

on:
  schedule:
    # Tick every 5 minutes from 07:00 through 22:55 Asia/Ho_Chi_Minh.
    # The app decides whether FDE, FDE interview, or Engineer is due.
    - cron: "*/5 0-15 * * *"
  workflow_dispatch:

jobs:
  scheduler-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Vercel scheduler tick
        shell: bash
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent --max-time 290 \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "https://news-keep-up.vercel.app/api/scheduler/tick"
          echo
